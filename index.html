  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#0f1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .hide-scrollbar::-webkit-scrollbar{display:none}.hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes bounceIn{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
    .slide-up{animation:slideUp .3s ease}.fade-in{animation:fadeIn .25s ease}.bounce-in{animation:bounceIn .4s ease}
    .card-bg{background:#1a1f2e}
    .glass{background:rgba(15,17,23,.96);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px)}
    input,textarea,select{-webkit-appearance:none;appearance:none;font-family:inherit}
    button{-webkit-tap-highlight-color:transparent;cursor:pointer;border:none;outline:none;font-family:inherit}
    .demo-badge{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#f59e0b;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
    * { -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>

    {id:'n3',name:'Plain Naan',fp:40,hs:false},{id:'n4',name:'Plain Kulcha',fp:45,hs:false},

    {id:'cf5',name:'Paneer Chilli',fp:250,hs:false},{id:'cf6',name:'Gobi Chilli',fp:280,hs:false},
    {id:'cf7',name:'Gobi Manchurian',fp:200,hs:false},{id:'cf8',name:'Gobi 65',fp:200,hs:false},
  ]},
  {id:'curry',name:'Curry',emoji:'🍲',color:C.orange,items:[

    {id:'no3',name:'Chicken Noodles',fp:180,hs:false},{id:'no4',name:'Chicken Schezwan Noodles',fp:190,hs:false},
    {id:'no5',name:'Egg Noodles',fp:130,hs:false},{id:'no6',name:'Egg Schezwan Noodles',fp:140,hs:false},

/* ── UTILS ── */
const genId=()=>`GB${Date.now().toString().slice(-6)}`;
const fmtT=d=>new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
const fmtD=d=>new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
const mDeep=(t,s)=>{const r={...t};for(const k in s){if(s[k]&&typeof s[k]==='object'&&!Array.isArray(s[k]))r[k]=mDeep(t[k]||{},s[k]);else r[k]=s[k];}return r;};

/* ── CHART WRAPPER ── */
const GBChart=({type,data,options={},height=200})=>{
  const cvs=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!cvs.current||typeof Chart==='undefined')return;
    if(inst.current){inst.current.destroy();inst.current=null;}
    const base={responsive:true,maintainAspectRatio:false,animation:{duration:600},
      plugins:{
        legend:{position:'bottom',labels:{color:'#9ca3af',font:{size:10},boxWidth:10,padding:10}},
        tooltip:{backgroundColor:'#0f1117',titleColor:'#f9fafb',bodyColor:'#9ca3af',borderColor:'#374151',borderWidth:1,padding:10,cornerRadius:8}
      }
    };
    if(type!=='doughnut'&&type!=='pie'){
      base.scales={
        x:{grid:{color:'rgba(55,65,81,.3)'},ticks:{color:'#6b7280',font:{size:9}},border:{display:false}},
        y:{grid:{color:'rgba(55,65,81,.3)'},ticks:{color:'#6b7280',font:{size:9}},border:{display:false}}
      };
    }
    inst.current=new Chart(cvs.current,{type,data,options:mDeep(base,options)});
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[type,JSON.stringify(data)]);
  return R`<div style=${{height:height+'px',position:'relative'}}><canvas ref=${cvs}></canvas></div>`;
};

/* ── KPI CARD ── */
const Kpi=({label,value,sub,color,icon,trend})=>R`
  <div class="p-4 rounded-2xl card-bg flex flex-col gap-1">
    <div class="flex items-center justify-between">
      <span class="text-xl">${icon}</span>
      ${trend!==undefined?R`<span class=${'text-xs font-semibold '+(trend>=0?'text-green-400':'text-red-400')}>${trend>=0?'↑':'↓'}${Math.abs(trend)}%</span>`:''}
    </div>
    <p class="font-bold text-2xl leading-tight" style=${{color}}>${value}</p>
    <p class="text-xs" style=${{color:'#6b7280'}}>${label}</p>
    ${sub?R`<p class="text-xs" style=${{color:'#374151'}}>${sub}</p>`:''}
  </div>`;

/* ── ANALYTICS TAB ── */
const Analytics=({orders})=>{
  const isDemo=orders.length===0;
  const wkLbls=useMemo(()=>Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toLocaleDateString('en-IN',{month:'short',day:'numeric'});}),[]);
  const wkRev=useMemo(()=>{
    if(isDemo)return SW;
    return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return orders.filter(o=>new Date(o.time).toDateString()===d.toDateString()&&o.status!=='cancelled').reduce((s,o)=>s+o.total,0);});
  },[orders,isDemo]);
  const types=useMemo(()=>{
    if(isDemo)return{di:45,to:30,de:25};
    return{di:orders.filter(o=>o.type==='dine-in').length,to:orders.filter(o=>o.type==='takeout').length,de:orders.filter(o=>o.type==='delivery').length};
  },[orders,isDemo]);
  const stt=useMemo(()=>{
    if(isDemo)return{p:3,pr:8,r:5,d:80,c:4};
    return{p:orders.filter(o=>o.status==='pending').length,pr:orders.filter(o=>o.status==='preparing').length,r:orders.filter(o=>o.status==='ready').length,d:orders.filter(o=>o.status==='delivered').length,c:orders.filter(o=>o.status==='cancelled').length};
  },[orders,isDemo]);
  const top=useMemo(()=>{
    if(isDemo)return STOP;
    const c={};
    orders.filter(o=>o.status!=='cancelled').forEach(ord=>ord.items.forEach(it=>{if(!c[it.name])c[it.name]={qty:0,revenue:0};c[it.name].qty+=it.qty;c[it.name].revenue+=it.price*it.qty;}));
    return Object.entries(c).sort((a,b)=>b[1].qty-a[1].qty).slice(0,7).map(([name,d])=>({name:name.length>16?name.slice(0,16)+'…':name,...d}));
  },[orders,isDemo]);

  const todayStr=new Date().toDateString();
  const todayO=orders.filter(o=>new Date(o.time).toDateString()===todayStr);
  const tRev=isDemo?1750:todayO.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+o.total,0);
  const wRev=isDemo?SW.reduce((a,b)=>a+b,0):wkRev.reduce((a,b)=>a+b,0);
  const aRev=isDemo?128300:orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+o.total,0);
  const tOrds=isDemo?312:orders.length;
  const avg=isDemo?411:(orders.filter(o=>o.status!=='cancelled').length>0?Math.round(aRev/orders.filter(o=>o.status!=='cancelled').length):0);

  const lineData={labels:wkLbls,datasets:[{label:'Revenue',data:wkRev,borderColor:C.amber,backgroundColor:'rgba(245,158,11,.08)',borderWidth:2.5,pointBackgroundColor:C.amber,pointRadius:4,tension:.4,fill:true}]};
  const typeD={labels:['Dine In 🪑','Takeout 📦','Delivery 🛵'],datasets:[{data:[types.di,types.to,types.de],backgroundColor:[C.amber,C.blue,C.green],borderColor:'#0f1117',borderWidth:3,hoverOffset:6}]};
  const sttD={labels:['Pending','Preparing','Ready','Delivered','Cancelled'],datasets:[{data:[stt.p,stt.pr,stt.r,stt.d,stt.c],backgroundColor:[C.amber,C.blue,C.green,'#6b7280',C.red],borderColor:'#0f1117',borderWidth:3,hoverOffset:6}]};
  const topB={labels:top.map(i=>i.name),datasets:[{label:'Qty',data:top.map(i=>i.qty),backgroundColor:[C.amber,C.red,C.blue,C.green,C.purple,C.orange,C.teal],borderRadius:6,borderSkipped:false}]};
  const pkB={labels:['10am','11am','12pm','1pm','2pm','3pm','4pm','5pm','6pm','7pm','8pm','9pm','10pm'],datasets:[{label:'Orders',data:isDemo?SPEAK:Array(13).fill(0),backgroundColor:SPEAK.map(v=>v>=35?C.red:v>=20?C.amber:'rgba(245,158,11,.25)'),borderRadius:5,borderSkipped:false}]};
  const rvtB={labels:['Dine In','Takeout','Delivery'],datasets:[{label:'Revenue',data:isDemo?[58400,38900,31000]:[orders.filter(o=>o.type==='dine-in'&&o.status!=='cancelled').reduce((s,o)=>s+o.total,0),orders.filter(o=>o.type==='takeout'&&o.status!=='cancelled').reduce((s,o)=>s+o.total,0),orders.filter(o=>o.type==='delivery'&&o.status!=='cancelled').reduce((s,o)=>s+o.total,0)],backgroundColor:[C.amber,C.blue,C.green],borderRadius:8,borderSkipped:false}]};
  const nL={plugins:{legend:{display:false}}};
  const iY={indexAxis:'y'};

  return R`<div class="fade-in">
    ${isDemo?R`<div class="flex items-center gap-2 mb-4"><span class="demo-badge">📊 Sample Data</span><span class="text-xs" style=${{color:'#6b7280'}}>Showing demo data until real orders arrive</span></div>`:''}
    <div class="grid grid-cols-2 gap-3 mb-5">
      <${Kpi} icon="📅" label="Today's Revenue" value=${'₹'+tRev.toLocaleString()} sub=${(isDemo?17:todayO.length)+' orders'} color=${C.amber} trend=${12}/>
      <${Kpi} icon="📆" label="This Week" value=${'₹'+wRev.toLocaleString()} sub="last 7 days" color=${C.green} trend=${8}/>
      <${Kpi} icon="🧾" label="Total Orders" value=${tOrds} sub="all time" color=${C.blue}/>
      <${Kpi} icon="💰" label="Avg Order" value=${'₹'+avg} sub="per order" color=${C.purple} trend=${5}/>
    </div>
    <div class="rounded-2xl p-4 card-bg mb-4">
      <div class="flex items-center justify-between mb-3">
        <p class="text-white font-semibold text-sm">📈 Revenue Trend</p>
        <span class="text-xs" style=${{color:'#6b7280'}}>Last 7 Days</span>
      </div>
      <${GBChart} type="line" data=${lineData} height=${180} options=${{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'₹'+v,color:'#6b7280',font:{size:9}},grid:{color:'rgba(55,65,81,.3)'},border:{display:false}}}}}/>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="rounded-2xl p-3 card-bg">
        <p class="text-white font-semibold text-xs mb-2">🗂 Order Types</p>
        <${GBChart} type="doughnut" data=${typeD} height=${160} options=${{plugins:{legend:{position:'bottom',labels:{font:{size:9},boxWidth:8,padding:6}}},cutout:'65%'}}/>
      </div>
      <div class="rounded-2xl p-3 card-bg">
        <p class="text-white font-semibold text-xs mb-2">🔄 Order Status</p>
        <${GBChart} type="doughnut" data=${sttD} height=${160} options=${{plugins:{legend:{position:'bottom',labels:{font:{size:9},boxWidth:8,padding:6}}},cutout:'65%'}}/>
      </div>
    </div>
    <div class="rounded-2xl p-4 card-bg mb-4">
      <div class="flex items-center justify-between mb-3">
        <p class="text-white font-semibold text-sm">🏆 Top Selling Items</p>
        <span class="text-xs" style=${{color:'#6b7280'}}>By Qty</span>
      </div>
      <${GBChart} type="bar" data=${topB} height=${200} options=${{...nL,...iY,scales:{x:{grid:{color:'rgba(55,65,81,.3)'},ticks:{color:'#6b7280',font:{size:9}},border:{display:false}},y:{grid:{display:false},ticks:{color:'#e5e7eb',font:{size:9}},border:{display:false}}}}}/>
      <div class="mt-4 space-y-2">
        ${top.slice(0,5).map((item,i)=>R`
          <div class="flex items-center gap-2" key=${i}>
            <span class="text-xs font-bold w-4" style=${{color:'#6b7280'}}>${i+1}</span>
            <div class="flex-1 h-1.5 rounded-full" style=${{background:'#111827'}}>
              <div class="h-full rounded-full" style=${{width:Math.round((item.qty/top[0].qty)*100)+'%',background:'linear-gradient(90deg,#f59e0b,#ef4444)'}}></div>
            </div>
            <span class="text-xs text-white" style=${{width:'7rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${item.name}</span>
            <span class="text-xs font-semibold" style=${{color:C.amber}}>₹${item.revenue.toLocaleString()}</span>
          </div>`)}
      </div>
    </div>
    <div class="rounded-2xl p-4 card-bg mb-4">
      <p class="text-white font-semibold text-sm mb-3">💳 Revenue by Order Type</p>
      <${GBChart} type="bar" data=${rvtB} height=${160} options=${{...nL,scales:{x:{grid:{display:false},ticks:{color:'#e5e7eb',font:{size:10}},border:{display:false}},y:{grid:{color:'rgba(55,65,81,.3)'},ticks:{color:'#6b7280',font:{size:9},callback:v=>'₹'+v},border:{display:false}}}}}/>
    </div>
    <div class="rounded-2xl p-4 card-bg mb-4">
      <div class="flex items-center justify-between mb-1">
        <p class="text-white font-semibold text-sm">⏰ Peak Hours</p>
        <span class="text-xs" style=${{color:'#6b7280'}}>Orders/Hour</span>
      </div>
      <p class="text-xs mb-3" style=${{color:'#6b7280'}}>🔴 Rush &nbsp;🟡 Busy &nbsp;⬛ Slow</p>
      <${GBChart} type="bar" data=${pkB} height=${150} options=${{...nL,scales:{x:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:8}},border:{display:false}},y:{grid:{color:'rgba(55,65,81,.3)'},ticks:{color:'#6b7280',font:{size:9}},border:{display:false}}}}}/>
      <p class="text-center text-xs mt-3" style=${{color:'#6b7280'}}>🔥 Peak: <span style=${{color:C.red}}>7pm–10pm</span> &nbsp;|&nbsp; Also busy: <span style=${{color:C.amber}}>12pm–2pm</span></p>
    </div>
    <div class="rounded-2xl p-4 card-bg mb-4">
      <p class="text-white font-semibold text-sm mb-3">📋 Financial Summary</p>
      ${[
        {label:"Gross Revenue",value:'₹'+aRev.toLocaleString(),color:C.green},
        {label:"Today's Collection",value:'₹'+tRev.toLocaleString(),color:C.amber},
        {label:"This Week",value:'₹'+wRev.toLocaleString(),color:C.blue},
        {label:"Total Transactions",value:''+tOrds,color:C.purple},
        {label:"Avg Ticket Size",value:'₹'+avg,color:C.orange},
        {label:"Cancelled (Loss)",value:isDemo?'₹2,100':'₹'+orders.filter(o=>o.status==='cancelled').reduce((s,o)=>s+o.total,0),color:C.red},
      ].map((r,i)=>R`
        <div class="flex justify-between items-center py-2.5" key=${i} style=${{borderBottom:i<5?'1px solid #111827':'none'}}>
          <span class="text-sm" style=${{color:'#9ca3af'}}>${r.label}</span>
          <span class="font-bold text-sm" style=${{color:r.color}}>${r.value}</span>
        </div>`)}
    </div>
  </div>`;
};

/* ── SIZE MODAL ── */
const SizeModal=({item,onClose,onAdd})=>{
  const [size,setSize]=useState('full');
  const price=size==='full'?item.fp:item.hp;
  return R`
    <div class="fixed inset-0 z-50 flex items-end justify-center fade-in" style=${{background:'rgba(0,0,0,.8)'}} onClick=${onClose}>
      <div class="w-full max-w-md rounded-t-3xl p-6 slide-up" style=${{background:'#1a1f2e'}} onClick=${e=>e.stopPropagation()}>
        <div class="w-10 h-1 rounded-full mx-auto mb-5" style=${{background:'#374151'}}></div>
        <h3 class="text-white font-bold text-lg mb-1">${item.name}</h3>
        <p class="text-gray-400 text-sm mb-5">Choose portion size</p>
        <div class="grid grid-cols-2 gap-3 mb-6">
          ${[['full',item.fp,'Full Portion'],['half',item.hp,'Half Portion']].map(([sz,pr,lb])=>R`
            <button key=${sz} onClick=${()=>setSize(sz)} class="p-4 rounded-2xl text-left transition-all" style=${{border:'2px solid '+(size===sz?C.amber:'#374151'),background:size===sz?'rgba(245,158,11,.1)':'#111827'}}>
              <p class="text-white font-semibold text-sm">${lb}</p>
              <p class="font-bold text-xl mt-1" style=${{color:C.amber}}>₹${pr}</p>
            </button>`)}

          <div>
            <div class="flex gap-2 mb-4 overflow-x-auto hide-scrollbar">
              ${[['all','All'],...Object.entries(SCfg).map(([k,v])=>[k,v.label])].map(([k,lb])=>R`
                <button key=${k} onClick=${()=>setFStt(k)} class="flex-shrink-0 px-3 py-1.5 rounded-xl text-xs font-semibold"
                  style=${{background:fStt===k?'linear-gradient(135deg,#f59e0b,#ef4444)':'#1a1f2e',color:fStt===k?'#000':'#9ca3af'}}>
                  ${lb} ${k!=='all'?'('+orders.filter(o=>o.status===k).length+')':''}
                </button>`)}
            </div>
            ${fOrds.length===0?R`
              <div class="text-center py-16">
                <div class="text-5xl mb-3">📋</div>
                <p class="text-white font-semibold mb-1">No orders yet</p>
                <p class="text-sm" style=${{color:'#6b7280'}}>Orders appear here in real time</p>
              </div>`:
            fOrds.map(order=>{const sc=SCfg[order.status];return R`
              <div key=${order.id} class="rounded-2xl p-4 mb-3 card-bg">
                <div class="flex items-start justify-between mb-2">
                  <div>
                    <div class="flex items-center gap-2 mb-0.5">
                      <span class="text-white font-bold text-sm">#${order.id}</span>
                      <span class="text-xs px-2 py-0.5 rounded-lg font-semibold" style=${{background:sc.bg,color:sc.color}}>${sc.icon} ${sc.label}</span>
                    </div>
                    <p class="text-xs" style=${{color:'#6b7280'}}>${order.customer.name} · ${order.type==='dine-in'?'🪑':order.type==='takeout'?'📦':'🛵'} ${order.type}${order.customer.tableNo?' · Table '+order.customer.tableNo:''}</p>
                    <p class="text-xs" style=${{color:'#6b7280'}}>${fmtD(order.time)} ${fmtT(order.time)} · 📞 ${order.customer.phone}</p>
                    ${order.customer.address?R`<p class="text-xs truncate" style=${{color:'#6b7280',maxWidth:'18rem'}}>📍 ${order.customer.address}</p>`:''}
                  </div>
                  <span class="font-bold text-lg flex-shrink-0" style=${{color:C.amber}}>₹${order.total}</span>
                </div>
                <div class="rounded-xl p-3 mb-3" style=${{background:'#111827'}}>
                  ${order.items.map((item,idx)=>R`<p key=${idx} class="text-xs mb-0.5" style=${{color:'#9ca3af'}}>${item.name}${item.hs?' ('+(item.size==='half'?'Half':'Full')+')':''} × ${item.qty} = ₹${item.price*item.qty}</p>`)}
                  ${order.customer.notes?R`<p class="text-xs mt-1 italic" style=${{color:'#6b7280'}}>"${order.customer.notes}"</p>`:''}
                </div>
                <div class="flex flex-wrap gap-1.5">
                  ${Object.entries(SCfg).map(([st,cfg])=>R`
                    <button key=${st} onClick=${()=>updStt(order.id,st)} class="px-2.5 py-1.5 rounded-xl text-xs font-semibold"
                      style=${{background:order.status===st?cfg.color:'#111827',color:order.status===st?'#000':'#6b7280'}}>
                      ${cfg.icon} ${cfg.label}
                    </button>`)}
                </div>
              </div>`;
            })}
          </div>`:''}

        ${tab==='analytics'?R`<${Analytics} orders=${orders}/>`:null}

        ${tab==='menu'?R`
          <div>
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-white font-bold">Menu Management</h3>
              <button onClick=${()=>setShowAdd(!showAdd)} class="px-4 py-2 rounded-xl text-black text-sm font-bold" style=${{background:'linear-gradient(135deg,#f59e0b,#ef4444)'}}>
                ${showAdd?'✕ Cancel':'+ Add Item'}
              </button>
            </div>
            ${showAdd?R`
              <div class="rounded-2xl p-4 mb-4 card-bg slide-up">
                <div class="space-y-3">
                  <select value=${newItem.catId} onChange=${e=>setNewItem(n=>({...n,catId:e.target.value}))} class="w-full p-3 rounded-xl text-white text-sm outline-none" style=${{background:'#111827'}}>
                    ${menuData.map(c=>R`<option key=${c.id} value=${c.id}>${c.emoji} ${c.name}</option>`)}
                  </select>
                  <input type="text" placeholder="Item Name" value=${newItem.name} onInput=${e=>setNewItem(n=>({...n,name:e.target.value}))} class="w-full p-3 rounded-xl text-white text-sm placeholder-gray-600 outline-none" style=${{background:'#111827'}}/>
                  <input type="number" placeholder="Price" value=${newItem.fp} onInput=${e=>setNewItem(n=>({...n,fp:e.target.value}))} class="w-full p-3 rounded-xl text-white text-sm placeholder-gray-600 outline-none" style=${{background:'#111827'}}/>
                  <label class="flex items-center gap-2">
                    <input type="checkbox" checked=${newItem.hs} onChange=${e=>setNewItem(n=>({...n,hs:e.target.checked}))} class="w-4 h-4 rounded"/>
                    <span class="text-gray-300 text-sm">Has Full / Half sizes?</span>
                  </label>
                  ${newItem.hs?R`<input type="number" placeholder="Half Price" value=${newItem.hp} onInput=${e=>setNewItem(n=>({...n,hp:e.target.value}))} class="w-full p-3 rounded-xl text-white text-sm placeholder-gray-600 outline-none" style=${{background:'#111827'}}/>`:''}
                  <button onClick=${()=>{
                    if(!newItem.name||!newItem.fp)return;
                    const item={id:'c-'+Date.now(),name:newItem.name,fp:parseInt(newItem.fp),hp:newItem.hs&&newItem.hp?parseInt(newItem.hp):undefined,hs:newItem.hs};
                    setMenuData(prev=>prev.map(c=>c.id===newItem.catId?{...c,items:[...c.items,item]}:c));
                    setNewItem({name:'',fp:'',hp:'',hs:false,catId:'tandoori'});setShowAdd(false);
                  }} class="w-full py-3 rounded-xl text-black font-bold text-sm" style=${{background:'linear-gradient(135deg,#f59e0b,#ef4444)'}}>Add Item</button>
                </div>
              </div>`:''}
            ${menuData.map(cat=>R`
              <div key=${cat.id} class="mb-5">
                <h4 class="font-semibold mb-2 text-sm flex items-center gap-2" style=${{color:cat.color}}>
                  ${cat.emoji} ${cat.name}
                  <span class="text-xs px-1.5 py-0.5 rounded-md card-bg" style=${{color:'#6b7280'}}>${cat.items.length}</span>
                </h4>
                ${cat.items.map(item=>R`
                  <div key=${item.id} class="p-3 rounded-2xl mb-2 card-bg">
                    ${editItem&&editItem.id===item.id?R`
                      <div>
                        <input value=${editItem.name} onInput=${e=>setEditItem(ei=>({...ei,name:e.target.value}))} class="w-full p-2.5 rounded-xl text-white text-sm outline-none mb-2" style=${{background:'#111827'}}/>
                        <div class="flex gap-2 mb-2">
                          <input type="number" value=${editItem.fp} onInput=${e=>setEditItem(ei=>({...ei,fp:e.target.value}))} placeholder="Full Price" class="flex-1 p-2.5 rounded-xl text-white text-sm outline-none" style=${{background:'#111827'}}/>
                          ${item.hs?R`<input type="number" value=${editItem.hp||''} onInput=${e=>setEditItem(ei=>({...ei,hp:e.target.value}))} placeholder="Half Price" class="flex-1 p-2.5 rounded-xl text-white text-sm outline-none" style=${{background:'#111827'}}/>`:''}
                        </div>
                        <div class="flex gap-2">
                          <button onClick=${()=>setEditItem(null)} class="flex-1 py-2 rounded-xl text-gray-300 text-sm font-semibold" style=${{background:'#374151'}}>Cancel</button>
                          <button onClick=${()=>{
                            setMenuData(prev=>prev.map(c=>({...c,items:c.items.map(i=>i.id===editItem.id?{...i,name:editItem.name,fp:parseInt(editItem.fp),hp:editItem.hp?parseInt(editItem.hp):i.hp}:i)})));
                            setEditItem(null);
                          }} class="flex-1 py-2 rounded-xl text-black text-sm font-bold" style=${{background:C.amber}}>Save</button>
                        </div>
                      </div>`
                    :R`
                      <div class="flex items-center gap-3">
                        <div class="flex-1 min-w-0">
                          <p class="text-white text-sm font-medium truncate">${item.name}</p>
                          <p class="text-xs font-semibold mt-0.5" style=${{color:C.amber}}>${item.hs?'₹'+item.hp+' Half · ₹'+item.fp+' Full':'₹'+item.fp}</p>
                        </div>
                        <button onClick=${()=>setEditItem({...item})} class="w-8 h-8 rounded-xl flex items-center justify-center text-sm" style=${{background:'#111827'}}>✏️</button>
                        <button onClick=${()=>setMenuData(prev=>prev.map(c=>({...c,items:c.items.filter(i=>i.id!==item.id)})))} class="w-8 h-8 rounded-xl flex items-center justify-center text-sm" style=${{background:'#111827'}}>🗑️</button>
                      </div>`}
                  </div>`)}
              </div>`)}
          </div>`:''}
      </div>
    </div>`;
};

/* ── APP ── */
const App=()=>{
  const [view,setView]=useState('customer');
  const [orders,setOrders]=useState([]);
  const [menuData,setMenuData]=useState(MENU0);
  return R`
    <div style=${{maxWidth:'430px',margin:'0 auto',minHeight:'100vh'}}>
      ${view==='customer'
        ?R`<${CustomerView} onGoAdmin=${()=>setView('admin')} orders=${orders} setOrders=${setOrders} menuData=${menuData}/>`
        :R`<${AdminView} onGoBack=${()=>setView('customer')} orders=${orders} setOrders=${setOrders} menuData=${menuData} setMenuData=${setMenuData}/>`}
    </div>`;
};

render(R`<${App}/>`,document.getElementById('root'));
</script>
</body>
</html>
